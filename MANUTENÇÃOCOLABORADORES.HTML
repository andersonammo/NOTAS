<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SaaSERP - Manutenção de Colaboradores</title>
    <style>
        :root { --orange: #f28b30; --light-orange: #fce4d0; --border: #d1d1d1; }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f4f4f4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; }

        .window { flex: 1; display: flex; flex-direction: column; background: white; margin: 10px; border: 2px solid var(--orange); border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .win-header { background: var(--orange); color: white; padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        
        .row { display: flex; gap: 20px; margin-bottom: 15px; align-items: flex-end; }
        .field { display: flex; flex-direction: column; flex: 1; }
        
        label { margin-bottom: 5px; font-size: 12px; font-weight: bold; color: #555; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 3px; outline: none; }
        input:focus, select:focus { border-color: var(--orange); }
        
        /* Formulário Bloqueado */
        fieldset { border: none; padding: 0; margin: 0; }
        fieldset:disabled input, fieldset:disabled select, fieldset:disabled textarea { background: #e9ecef; cursor: not-allowed; color: #666; }

        .tabs { display: flex; background: #f1f1f1; border: 1px solid var(--border); border-bottom: none; margin-top: 15px; }
        .tab-btn { padding: 12px 20px; cursor: pointer; border-right: 1px solid var(--border); font-size: 13px; }
        .tab-btn.active { background: white; border-bottom: 3px solid var(--orange); font-weight: bold; }
        
        .tab-content { border: 1px solid var(--border); min-height: 200px; padding: 20px; background: white; margin-bottom: 20px; }
        .pane { display: none; }
        .pane.active { display: block; }

        /* Rodapé de Ações */
        .footer-navbar { background: #333; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #000; align-items: center; justify-content: space-between;}
        .action-group { display: flex; gap: 10px; }
        
        .nav-item { padding: 10px 15px; color: white; cursor: pointer; font-size: 12px; background: #444; border: 1px solid #555; border-radius: 3px; font-weight: bold; transition: 0.2s;}
        .nav-item:hover { background: var(--orange); }

        .btn-save { background: var(--orange); color: white; border: none; padding: 10px 30px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 14px; }
        .btn-save:disabled { background: #666; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--light-orange); padding: 10px; text-align: left; border: 1px solid var(--border); }
        td { border: 1px solid var(--border); padding: 8px; }

        /* Estilo do Select Master no Cabeçalho */
        .master-select {
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #fff;
            background: #d97a26;
            color: white;
            font-weight: bold;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .master-select:focus { border-color: #fff; }
        .master-select option { background: white; color: #333; }
    </style>
</head>
<body>

<div class="window">
    <div class="win-header">
        <span>SaaSERP - Manutenção de Colaboradores</span> 
        
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 12px; font-weight: normal;">📍 Visão da Unidade:</span>
                <!-- Se desejar, futuramente esse select também pode ser preenchido dinamicamente pelo banco de lojas -->
                <select id="visaoCidade" class="master-select" onchange="mudarVisaoFilial()">
                    <option value="TODAS">🌟 TODAS AS CIDADES (Master)</option>
                    <option value="TOLEDO">Óticas Ammo - Toledo</option>
                    <option value="UMUARAMA">Óticas Ammo - Umuarama</option>
                    <option value="PALOTINA">Óticas Ammo - Palotina</option>
                    <option value="DOURADINA">Óticas Ammo - Douradina</option>
                </select>
            </div>
            <span style="font-size: 12px; border-left: 1px solid #fff; padding-left: 15px;">👤 Admin Logado</span>
        </div>
    </div>
    
    <form id="colabForm" class="content">
        <fieldset id="areaCampos" disabled>
            <div class="row">
                <div class="field" style="flex: 2;"><label>Nome Completo:</label><input type="text" name="nome" id="nome" required></div>
                <div class="field"><label>Código Colaborador:</label><input type="text" name="codigo" id="codigo" required title="Código único do colaborador"></div>
                <div class="field"><label>Data Ingresso:</label><input type="date" name="data_admissao" id="data_admissao" required></div>
            </div>

            <div class="row">
                <div class="field"><label>CPF/CNPJ:</label><input type="text" name="cpf_cnpj" id="cpf_cnpj"></div>
                <div class="field"><label>Situação:</label><select name="situacao" id="situacao"><option value="Ativo">Ativo</option><option value="Inativo">Inativo</option></select></div>
                <div class="field" style="flex: 0.5; flex-direction: row; align-items: center; gap: 10px;"><input type="checkbox" name="is_vendedor" id="is_vendedor" value="Sim"><label for="is_vendedor" style="margin:0">Vendedor</label></div>
                <div class="field"><label>Função Principal:</label><input type="text" name="funcao" id="funcao"></div>
            </div>

            <div class="tabs">
                <div class="tab-btn active" onclick="openTab(event, 't-lojas')">Lojas Vinculadas</div>
                <div class="tab-btn" onclick="openTab(event, 't-acesso')">Acesso e Contato</div>
                <div class="tab-btn" onclick="openTab(event, 't-extra')">Dados Adicionais</div>
            </div>

            <div class="tab-content">
                <div id="t-lojas" class="pane active">
                    <button type="button" onclick="addLojaRow()" id="btnAdicionarLoja" style="margin-bottom:10px; padding: 5px; cursor:pointer;" disabled>⏳ Carregando Lojas...</button>
                    <table id="tabLojas"><thead><tr><th style="width:100px;">Nr. Loja</th><th>Nome da Loja</th><th style="width:30px;"></th></tr></thead><tbody></tbody></table>
                </div>
                <div id="t-acesso" class="pane">
                    <div class="row">
                        <div class="field"><label>Login:</label><input type="text" name="login" id="login" required></div>
                        <div class="field"><label>Senha:</label><input type="password" name="senha" id="senha" required></div>
                    </div>
                    <div class="row">
                        <div class="field"><label>E-mail:</label><input type="email" name="email" id="email"></div>
                        <div class="field"><label>Telefone:</label><input type="text" name="telefone" id="telefone"></div>
                    </div>
                </div>
                <div id="t-extra" class="pane">
                    <div class="row">
                        <div class="field"><label>Data Nascimento:</label><input type="date" name="data_nasc" id="data_nasc"></div>
                        <div class="field"><label>Cargo:</label><input type="text" name="cargo" id="cargo"></div>
                    </div>
                    <div class="row"><div class="field"><label>Observações:</label><textarea name="observacoes" id="observacoes"></textarea></div></div>
                </div>
            </div>
        </fieldset>
    </form>

    <div class="footer-navbar">
        <div class="action-group">
            <div class="nav-item" id="btnNovo" onclick="iniciarNovo()">📄 Novo</div>
            <div class="nav-item" id="btnLocalizar" onclick="localizar()">🔍 Localizar</div>
            <div class="nav-item" id="btnEditar" onclick="habilitarEdicao()" style="display:none; background:#2196F3; border-color:#1976D2;">✏️ Editar</div>
        </div>
        <div>
            <button type="submit" form="colabForm" class="btn-save" id="btnSalvar" disabled>💾 Salvar (Bloqueado)</button>
        </div>
    </div>
</div>

<script>
    // =====================================================================
    // CONFIGURAÇÃO DOS BANCOS DE DADOS
    // =====================================================================
    const URL_BANCO_FISCAL = "https://script.google.com/macros/s/AKfycbxl_T0iTsrmHCeuLp6tcSMT9BxSaWEcd_nXAvZVgFsfsN1ioQVgKNS_SRFwqdCRqyUA/exec";
    const URL_BANCO_COLABORADORES = "https://script.google.com/macros/s/AKfycbzciM5IA25tZ9CcRkwj0-okP5CQ0IG3wpmZeT40vbPGiCtovD3au5Ccgr9jTxcJhSc6/exec"; 
    
    // COLOQUE AQUI A URL DO SEU SCRIPT DO BANCO DE LOJAS
    const URL_BANCO_LOJAS = "https://script.google.com/macros/s/AKfycbzciM5IA25tZ9CcRkwj0-okP5CQ0IG3wpmZeT40vbPGiCtovD3au5Ccgr9jTxcJhSc6/exec"; 
    // =====================================================================

    // A lista agora inicia vazia e é preenchida pelo banco de dados
    let LOJAS_DISPONIVEIS = []; 

    // === BUSCAR LOJAS DO BANCO AO ABRIR A PÁGINA ===
    window.onload = function() {
        carregarLojas();
    };

    function carregarLojas() {
        fetch(URL_BANCO_LOJAS, {
            method: "POST",
            body: JSON.stringify({ acao: "listar_lojas" })
        })
        .then(res => res.json())
        .then(res => {
            if(res.sucesso) {
                LOJAS_DISPONIVEIS = res.dados;
                // Habilita o botão após as lojas serem carregadas
                const btnAdd = document.getElementById("btnAdicionarLoja");
                btnAdd.textContent = "+ Vincular Loja";
                btnAdd.disabled = false;
                console.log("Lojas carregadas com sucesso!");
            } else {
                console.error("Erro ao buscar lojas: " + res.mensagem);
                document.getElementById("btnAdicionarLoja").textContent = "Erro ao carregar lojas";
            }
        })
        .catch(err => {
            console.error("Falha na comunicação com o banco de lojas.", err);
            document.getElementById("btnAdicionarLoja").textContent = "Erro de conexão";
        });
    }

    // === FUNÇÃO DO MENU MASTER ===
    function mudarVisaoFilial() {
        const cidadeSelecionada = document.getElementById('visaoCidade').value;
        console.log("Visão alterada para: " + cidadeSelecionada);
    }

    let modoOperacao = ""; 

    // === CONTROLE DA TRAVA ===
    function iniciarNovo() {
        document.getElementById("colabForm").reset();
        document.getElementById("tabLojas").getElementsByTagName('tbody')[0].innerHTML = "";
        document.getElementById("areaCampos").disabled = false; 
        document.getElementById("btnSalvar").disabled = false;
        document.getElementById("btnSalvar").textContent = "💾 Cadastrar Novo";
        document.getElementById("btnEditar").style.display = "none";
        document.getElementById("codigo").readOnly = false; 
        modoOperacao = "salvar_colaborador";
    }

    function habilitarEdicao() {
        document.getElementById("areaCampos").disabled = false; 
        document.getElementById("codigo").readOnly = true; 
        document.getElementById("btnSalvar").disabled = false;
        document.getElementById("btnSalvar").textContent = "💾 Salvar Alterações";
        modoOperacao = "editar_colaborador";
    }

    // === BUSCA NO BANCO ===
    function localizar() {
        let termo = prompt("Digite o Nome, Código ou CPF do Colaborador:");
        if (!termo) return;

        document.getElementById("btnLocalizar").textContent = "⏳ Buscando...";
        
        fetch(URL_BANCO_COLABORADORES, {
            method: "POST",
            body: JSON.stringify({ acao: "localizar_colaborador", termo: termo })
        })
        .then(res => res.json())
        .then(res => {
            document.getElementById("btnLocalizar").textContent = "🔍 Localizar";
            if(res.sucesso) {
                preencherFormulario(res.dados);
                document.getElementById("areaCampos").disabled = true; 
                document.getElementById("btnSalvar").disabled = true;
                document.getElementById("btnSalvar").textContent = "🔒 Leitura Apenas";
                document.getElementById("btnEditar").style.display = "block"; 
            } else {
                alert(res.mensagem);
            }
        })
        .catch(err => {
            alert("Erro ao comunicar com o servidor do RH.");
            console.error(err);
            document.getElementById("btnLocalizar").textContent = "🔍 Localizar";
        });
    }

    // Preenche os campos após localizar 
    function preencherFormulario(dados) {
        document.getElementById("nome").value = dados.nome || "";
        document.getElementById("codigo").value = dados.codigo || "";
        
        if(dados.data_admissao) document.getElementById("data_admissao").value = dados.data_admissao.substring(0, 10);
        if(dados.data_nasc) document.getElementById("data_nasc").value = dados.data_nasc.substring(0, 10);
        
        document.getElementById("cpf_cnpj").value = dados.cpf_cnpj || "";
        document.getElementById("situacao").value = dados.situacao || "Ativo";
        document.getElementById("is_vendedor").checked = (dados.is_vendedor === "Sim");
        document.getElementById("funcao").value = dados.funcao || "";
        document.getElementById("login").value = dados.login || "";
        document.getElementById("senha").value = dados.senha || "";
        document.getElementById("email").value = dados.email || "";
        document.getElementById("telefone").value = dados.telefone || "";
        document.getElementById("cargo").value = dados.cargo || "";
        document.getElementById("observacoes").value = dados.observacoes || "";

        let tbody = document.getElementById("tabLojas").getElementsByTagName('tbody')[0];
        tbody.innerHTML = "";
        
        if (dados.lojas_lista) {
            let lojas = dados.lojas_lista.split(" | ");
            lojas.forEach(lojaTexto => {
                let partes = lojaTexto.split(" - ");
                let idLoja = partes[0] || '';
                let nomeLoja = partes[1] || '';

                let tr = tbody.insertRow();
                let optionsHTML = '<option value="">Selecione uma loja...</option>';
                
                // Utiliza a variável preenchida pelo banco de dados
                LOJAS_DISPONIVEIS.forEach(loja => {
                    let selected = (loja.id === idLoja) ? 'selected' : '';
                    optionsHTML += `<option value="${loja.id}" data-nome="${loja.nome}" ${selected}>${loja.id} - ${loja.nome}</option>`;
                });

                tr.innerHTML = `
                    <td>
                        <input type="text" class="l-nr" value="${idLoja}" readonly placeholder="Nr." style="width: 100%; background: #e9ecef; box-sizing: border-box;">
                    </td>
                    <td>
                        <select onchange="selecionarLoja(this)" style="width: 100%; box-sizing: border-box;">
                            ${optionsHTML}
                        </select>
                        <input type="hidden" class="l-nome" value="${nomeLoja}">
                    </td>
                    <td style="color:red;cursor:pointer; text-align:center; font-weight:bold; vertical-align: middle;" onclick="this.parentElement.remove()">X</td>
                `;
            });
        }
    }

    // === ENVIO DOS DADOS (NOVO OU EDIÇÃO) ===
    document.getElementById('colabForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if(!modoOperacao) return;

        const btn = document.getElementById('btnSalvar');
        let textoOriginal = btn.textContent;
        btn.textContent = "⏳ PROCESSANDO...";
        btn.disabled = true;

        const fd = new FormData(this);
        const dados = Object.fromEntries(fd.entries());
        
        if(!dados.is_vendedor) dados.is_vendedor = 'Não';
        
        let lojas = [];
        document.querySelectorAll("#tabLojas tbody tr").forEach(tr => {
            let num = tr.querySelector(".l-nr").value;
            let nome = tr.querySelector(".l-nome").value;
            if(num || nome) lojas.push(num + " - " + nome);
        });
        dados.lojas_lista = lojas.join(" | ");
        
        fetch(URL_BANCO_COLABORADORES, {
            method: "POST",
            body: JSON.stringify({ acao: modoOperacao, dados: dados })
        })
        .then(res => res.json())
        .then(res => {
            alert(res.mensagem);
            if(res.sucesso) location.reload();
            else { btn.textContent = textoOriginal; btn.disabled = false; }
        })
        .catch(err => {
            alert("ERRO DE COMUNICAÇÃO com o Banco de RH.");
            console.error(err);
            btn.textContent = textoOriginal; btn.disabled = false;
        });
    });

    // === FUNÇÕES VISUAIS E DE LOJA ===
    function openTab(evt, tabId) {
        let panes = document.getElementsByClassName("pane");
        let btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < panes.length; i++) { panes[i].classList.remove("active"); }
        for (let i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function selecionarLoja(selectObj) {
        let tr = selectObj.closest('tr');
        let option = selectObj.options[selectObj.selectedIndex];
        
        let idLoja = selectObj.value;
        let nomeLoja = option.getAttribute('data-nome') || '';

        tr.querySelector('.l-nr').value = idLoja;
        tr.querySelector('.l-nome').value = nomeLoja;
    }

    function addLojaRow() {
        let table = document.getElementById("tabLojas").getElementsByTagName('tbody')[0];
        let row = table.insertRow();
        
        let optionsHTML = '<option value="">Selecione uma loja...</option>';
        LOJAS_DISPONIVEIS.forEach(loja => {
            optionsHTML += `<option value="${loja.id}" data-nome="${loja.nome}">${loja.id} - ${loja.nome}</option>`;
        });

        row.innerHTML = `
            <td>
                <input type="text" class="l-nr" readonly placeholder="Nr." style="width: 100%; background: #e9ecef; box-sizing: border-box;">
            </td>
            <td>
                <select onchange="selecionarLoja(this)" style="width: 100%; box-sizing: border-box;">
                    ${optionsHTML}
                </select>
                <input type="hidden" class="l-nome">
            </td>
            <td style="color:red;cursor:pointer; text-align:center; font-weight:bold; vertical-align: middle;" onclick="this.parentElement.remove()">X</td>
        `;
    }
</script>
</body>
</html>
